<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Me — Wesley</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #15191f;
    --panel-2: #1c2128;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --user: #2f81f7;
    --bot: #2ea043;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .status { font-size: 12px; color: var(--muted); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-width: 85%;
  }
  .msg.user {
    background: var(--user);
    color: #fff;
    margin-left: auto;
    border-bottom-right-radius: 2px;
  }
  .msg.bot {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.error {
    background: #3a1f1f;
    border: 1px solid #6b2424;
    color: #ffb4b4;
  }
  .typing { color: var(--muted); font-style: italic; }
  form {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  textarea {
    flex: 1;
    min-height: 44px;
    max-height: 160px;
    resize: none;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #0b0d10;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { display: flex; gap: 8px; }
  .actions button {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 400;
    font-size: 12px;
    padding: 6px 10px;
  }
  .actions button:hover { color: var(--text); }
  #mic-btn {
    padding: 0 14px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 18px;
    transition: color .15s, border-color .15s;
  }
  #mic-btn:hover { color: var(--text); border-color: var(--muted); }
  #mic-btn.listening {
    color: #f85149;
    border-color: #f85149;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  /* Tab bar */
  #tabs {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 20px;
  }
  .tab {
    background: transparent;
    color: var(--muted);
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  /* Dashboard panel */
  #dashboard {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .dash-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .dash-card h2 {
    margin: 0 0 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .refresh-btn:hover { color: var(--text); }
  #priorities-text {
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; }
  .qa-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .qa-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* Upload card */
  .upload-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #upload-file {
    flex: 1;
    min-width: 0;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  #upload-file:focus { outline: none; border-color: var(--accent); }
  #upload-btn {
    background: var(--accent);
    color: #0b0d10;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 8px;
    white-space: nowrap;
  }
  #upload-status { font-size: 13px; color: var(--muted); min-height: 18px; margin-top: 8px; }
  /* Drafts card */
  .draft-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .draft-row:last-child { border-bottom: none; }
  .draft-meta { flex: 1; min-width: 0; }
  .draft-meta .draft-to { font-size: 12px; color: var(--muted); }
  .draft-meta .draft-subject { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .draft-meta .draft-snippet { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .draft-send-btn {
    background: var(--bot);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .draft-send-btn:hover { opacity: 0.85; }
  #drafts-status { font-size: 13px; color: var(--muted); min-height: 18px; }
  /* Password gate overlay */
  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #gate.hidden { display: none; }
  .gate-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .gate-box h2 { margin: 0; font-size: 18px; }
  .gate-box p  { margin: 0; color: var(--muted); font-size: 13px; }
  .gate-box input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
    outline: none;
  }
  .gate-box input:focus { border-color: var(--accent); }
  .gate-box .gate-err { color: #ffb4b4; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
<div id="gate">
  <div class="gate-box">
    <h2>🔒 AI Me</h2>
    <p>Enter your password to continue.</p>
    <input id="gate-pw" type="password" placeholder="Password" autofocus />
    <button id="gate-btn">Unlock</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<header>
  <h1>🤖 AI Me — Wesley</h1>
  <div class="actions">
    <span class="status" id="status">thread: <span id="tid">—</span></span>
    <button onclick="newThread()">New chat</button>
    <button id="mute-btn" onclick="toggleMute()" title="Toggle voice output">🔊</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<nav id="tabs">
  <button id="tab-chat" class="tab active" onclick="showTab('chat')">💬 Chat</button>
  <button id="tab-dash" class="tab" onclick="showTab('dash')">📊 Dashboard</button>
</nav>

<div id="chat"></div>

<div id="dashboard">
  <div class="dash-card">
    <h2>Today's Priorities <button class="refresh-btn" onclick="refreshPriorities()">↻ Refresh</button></h2>
    <div id="priorities-text">—</div>
  </div>
  <div class="dash-card">
    <h2>Quick Actions</h2>
    <div class="quick-actions">
      <button class="qa-btn" onclick="quickAction('Log interview for ')">📋 Log Interview</button>
      <button class="qa-btn" onclick="quickAction('Log ministering for ')">🏠 Log Ministering</button>
      <button class="qa-btn" onclick="quickAction('Protect family time: ')">👨‍👩‍👧‍👦 Protect Family Time</button>
      <button class="qa-btn" onclick="quickAction('Create calendar event: ')">📅 Add Calendar Event</button>
      <button class="qa-btn" onclick="quickAction('Set a reminder for ')">⏰ Set Reminder</button>
    </div>
  </div>
  <div class="dash-card">
    <h2>Upload Note to Memory</h2>
    <div class="upload-row">
      <input id="upload-file" type="file" accept=".txt,.md" />
      <button id="upload-btn" type="button" onclick="uploadNote()">⬆ Upload</button>
    </div>
    <div id="upload-status"></div>
  </div>
  <div class="dash-card">
    <h2>Gmail Drafts <button class="refresh-btn" onclick="loadDrafts()">↻ Refresh</button></h2>
    <div id="drafts-status"></div>
    <div id="drafts-list"></div>
  </div>
</div>

<form id="form">
  <textarea id="input" placeholder="Ask Me anything... (Shift+Enter for newline)" autofocus></textarea>
  <button id="mic-btn" type="button" onclick="startVoiceInput()" title="Voice input">🎤</button>
  <button id="send" type="submit">Send</button>
</form>

<script>
  // --- Auth gate ---
  const gate    = document.getElementById("gate");
  const gatePw  = document.getElementById("gate-pw");
  const gateBtn = document.getElementById("gate-btn");
  const gateErr = document.getElementById("gate-err");

  let authToken = sessionStorage.getItem("aime_token");
  if (authToken) gate.classList.add("hidden");

  async function tryUnlock() {
    const pw = gatePw.value.trim();
    if (!pw) return;
    gateBtn.disabled = true;
    gateErr.textContent = "";
    // Probe /health/full — a 200 confirms the password is correct.
    try {
      const res = await fetch("/health/full", {
        headers: { "Authorization": "Bearer " + pw }
      });
      if (res.ok) {
        sessionStorage.setItem("aime_token", pw);
        authToken = pw;
        gate.classList.add("hidden");
        addMsg("bot", "Hey, I'm Me — Wesley's AI twin. Ask me about your schedule, emails, or anything else.");
      } else {
        gateErr.textContent = "Wrong password.";
        gatePw.value = "";
        gatePw.focus();
      }
    } catch (e) {
      gateErr.textContent = "Network error — try again.";
    } finally {
      gateBtn.disabled = false;
    }
  }

  gateBtn.addEventListener("click", tryUnlock);
  gatePw.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });

  function logout() {
    sessionStorage.removeItem("aime_token");
    authToken = null;
    chat.innerHTML = "";
    gatePw.value = "";
    gateErr.textContent = "";
    gate.classList.remove("hidden");
    gatePw.focus();
  }

  // --- Chat ---
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const tidEl = document.getElementById("tid");

  let threadId = localStorage.getItem("aime_thread") || crypto.randomUUID();
  localStorage.setItem("aime_thread", threadId);
  tidEl.textContent = threadId.slice(0, 8);

  function newThread() {
    threadId = crypto.randomUUID();
    localStorage.setItem("aime_thread", threadId);
    tidEl.textContent = threadId.slice(0, 8);
    chat.innerHTML = "";
    addMsg("bot", "New conversation started. What's up?");
  }

  function addMsg(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMsg("user", text);
    input.value = "";
    sendBtn.disabled = true;
    const typing = addMsg("bot", "…");
    typing.classList.add("typing");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + authToken,
        },
        body: JSON.stringify({ message: text, thread_id: threadId }),
      });
      const data = await res.json();
      typing.remove();
      if (res.status === 401) {
        logout();
        addMsg("error", "Session expired. Please log in again.");
      } else if (!res.ok) {
        addMsg("error", "Error: " + (data.detail?.error || JSON.stringify(data)));
      } else {
        addMsg("bot", data.response);
        speak(data.response);
      }
    } catch (err) {
      typing.remove();
      addMsg("error", "Network error: " + err.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  if (authToken) addMsg("bot", "Hey, I'm Me — Wesley's AI twin. Ask me about your schedule, emails, or anything else.");

  // --- Mute toggle ---
  const muteBtn = document.getElementById("mute-btn");
  let muted = localStorage.getItem("aime_muted") === "true";
  function updateMuteBtn() { muteBtn.textContent = muted ? "🔇" : "🔊"; }
  function toggleMute() {
    muted = !muted;
    localStorage.setItem("aime_muted", muted);
    if (muted) speechSynthesis.cancel();
    updateMuteBtn();
  }
  updateMuteBtn();

  // --- TTS with sentence chunking (Chrome ~200-char bug workaround) ---
  function speak(text) {
    if (muted || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    // Split on sentence-ending punctuation, keeping the delimiter
    const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
    const chunks = [];
    let current = "";
    for (const s of sentences) {
      if ((current + s).length > 200) {
        if (current) chunks.push(current.trim());
        current = s;
      } else {
        current += s;
      }
    }
    if (current.trim()) chunks.push(current.trim());
    chunks.forEach((chunk) => {
      const u = new SpeechSynthesisUtterance(chunk);
      u.lang = "en-US";
      u.rate = 1.0;
      speechSynthesis.speak(u);
    });
  }

  // --- Voice input ---
  const micBtn = document.getElementById("mic-btn");
  function startVoiceInput() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      addMsg("error", "Voice input is not supported in this browser. Try Chrome or Edge.");
      return;
    }
    if (micBtn.classList.contains("listening")) return; // debounce
    const recognition = new SR();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    micBtn.classList.add("listening");
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      input.value = transcript;
      form.requestSubmit();
    };
    recognition.onerror = () => { micBtn.classList.remove("listening"); };
    recognition.onend  = () => { micBtn.classList.remove("listening"); };
    recognition.start();
  }

  // --- Tabs ---
  const chatPanel = document.getElementById("chat");
  const formPanel = document.getElementById("form");
  const dashPanel = document.getElementById("dashboard");
  const tabChat   = document.getElementById("tab-chat");
  const tabDash   = document.getElementById("tab-dash");

  function showTab(tab) {
    if (tab === "dash") {
      chatPanel.style.display = "none";
      formPanel.style.display = "none";
      dashPanel.style.display = "block";
      tabChat.classList.remove("active");
      tabDash.classList.add("active");
      loadPriorities();
    } else {
      chatPanel.style.display = "";
      formPanel.style.display = "";
      dashPanel.style.display = "none";
      tabChat.classList.add("active");
      tabDash.classList.remove("active");
      input.focus();
    }
  }

  // --- Dashboard priorities (30-min sessionStorage cache) ---
  const PRIORITIES_TTL = 30 * 60 * 1000;

  async function loadPriorities(force = false) {
    const el = document.getElementById("priorities-text");
    const cached = sessionStorage.getItem("aime_priorities_cache");
    const ts = parseInt(sessionStorage.getItem("aime_priorities_time") || "0", 10);
    if (!force && cached && (Date.now() - ts < PRIORITIES_TTL)) {
      el.textContent = cached;
      return;
    }
    el.textContent = "Loading\u2026";
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + authToken,
        },
        body: JSON.stringify({ message: "Give me my top 3 priorities today.", thread_id: "dashboard-priorities" }),
      });
      const data = await res.json();
      if (res.ok) {
        el.textContent = data.response;
        sessionStorage.setItem("aime_priorities_cache", data.response);
        sessionStorage.setItem("aime_priorities_time", String(Date.now()));
      } else {
        el.textContent = "Could not load priorities.";
      }
    } catch {
      el.textContent = "Network error \u2014 try again.";
    }
  }

  function refreshPriorities() { loadPriorities(true); }

  // --- Drafts card ---
  async function loadDrafts() {
    const list   = document.getElementById("drafts-list");
    const status = document.getElementById("drafts-status");
    status.textContent = "Loading\u2026";
    list.innerHTML = "";
    try {
      const res = await fetch("/drafts", {
        headers: { "Authorization": "Bearer " + authToken },
      });
      const data = await res.json();
      status.textContent = "";
      if (!res.ok) { status.textContent = "\u274c " + (data.detail || "Failed to load."); return; }
      const drafts = data.drafts || [];
      if (!drafts.length) { status.textContent = "No drafts."; return; }
      drafts.forEach((d) => {
        const row = document.createElement("div");
        row.className = "draft-row";
        row.dataset.id = d.id;
        row.innerHTML = `
          <div class="draft-meta">
            <div class="draft-to">To: ${escHtml(d.to || '(unknown)')}</div>
            <div class="draft-subject">${escHtml(d.subject || '(no subject)')}</div>
            <div class="draft-snippet">${escHtml(d.snippet || '')}</div>
          </div>
          <button class="draft-send-btn" onclick="sendDraft('${d.id}', this)">✉ Send</button>
        `;
        list.appendChild(row);
      });
    } catch (e) {
      status.textContent = "\u274c Network error: " + e.message;
    }
  }

  async function sendDraft(draftId, btn) {
    if (!confirm("Send this draft? This will send a real email.")) return;
    btn.disabled = true;
    btn.textContent = "Sending\u2026";
    try {
      const res = await fetch(`/drafts/${draftId}/send`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + authToken },
      });
      const data = await res.json();
      if (res.ok) {
        btn.closest(".draft-row").remove();
        const list = document.getElementById("drafts-list");
        if (!list.children.length) document.getElementById("drafts-status").textContent = "No drafts.";
      } else {
        btn.textContent = "\u274c Error";
        btn.disabled = false;
      }
    } catch (e) {
      btn.textContent = "\u274c Error";
      btn.disabled = false;
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // --- Upload note ---
  async function uploadNote() {
    const fileInput = document.getElementById("upload-file");
    const status    = document.getElementById("upload-status");
    const btn       = document.getElementById("upload-btn");
    const file      = fileInput.files[0];
    if (!file) { status.textContent = "Pick a .txt or .md file first."; return; }
    btn.disabled = true;
    status.textContent = "Uploading\u2026";
    const form = new FormData();
    form.append("file", file);
    try {
      const res = await fetch("/upload", {
        method: "POST",
        headers: { "Authorization": "Bearer " + authToken },
        body: form,
      });
      const data = await res.json();
      if (res.ok) {
        status.textContent = `\u2705 Stored ${data.chunks} chunk${data.chunks !== 1 ? "s" : ""} from "${data.title}"`;
        fileInput.value = "";
      } else {
        status.textContent = `\u274c ${data.detail || "Upload failed."}`;
      }
    } catch (e) {
      status.textContent = `\u274c Network error: ${e.message}`;
    } finally {
      btn.disabled = false;
    }
  }

  // --- Quick action pre-fill ---
  function quickAction(template) {
    showTab("chat");
    input.value = template;
    input.focus();
    input.setSelectionRange(template.length, template.length);
  }
</script>
</body>
</html>
