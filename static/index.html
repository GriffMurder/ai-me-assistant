<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Me — Wesley</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #15191f;
    --panel-2: #1c2128;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --user: #2f81f7;
    --bot: #2ea043;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .status { font-size: 12px; color: var(--muted); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  .msg {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-width: 85%;
  }
  .msg.user {
    background: var(--user);
    color: #fff;
    margin-left: auto;
    border-bottom-right-radius: 2px;
  }
  .msg.bot {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg.error {
    background: #3a1f1f;
    border: 1px solid #6b2424;
    color: #ffb4b4;
  }
  .typing { color: var(--muted); font-style: italic; }
  form {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  textarea {
    flex: 1;
    min-height: 44px;
    max-height: 160px;
    resize: none;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #0b0d10;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { display: flex; gap: 8px; }
  .actions button {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 400;
    font-size: 12px;
    padding: 6px 10px;
  }
  .actions button:hover { color: var(--text); }
  /* Password gate overlay */
  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #gate.hidden { display: none; }
  .gate-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .gate-box h2 { margin: 0; font-size: 18px; }
  .gate-box p  { margin: 0; color: var(--muted); font-size: 13px; }
  .gate-box input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
    outline: none;
  }
  .gate-box input:focus { border-color: var(--accent); }
  .gate-box .gate-err { color: #ffb4b4; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
<div id="gate">
  <div class="gate-box">
    <h2>🔒 AI Me</h2>
    <p>Enter your password to continue.</p>
    <input id="gate-pw" type="password" placeholder="Password" autofocus />
    <button id="gate-btn">Unlock</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<header>
  <h1>🤖 AI Me — Wesley</h1>
  <div class="actions">
    <span class="status" id="status">thread: <span id="tid">—</span></span>
    <button onclick="newThread()">New chat</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div id="chat"></div>

<form id="form">
  <textarea id="input" placeholder="Ask Me anything... (Shift+Enter for newline)" autofocus></textarea>
  <button id="send" type="submit">Send</button>
</form>

<script>
  // --- Auth gate ---
  const gate    = document.getElementById("gate");
  const gatePw  = document.getElementById("gate-pw");
  const gateBtn = document.getElementById("gate-btn");
  const gateErr = document.getElementById("gate-err");

  let authToken = sessionStorage.getItem("aime_token");
  if (authToken) gate.classList.add("hidden");

  async function tryUnlock() {
    const pw = gatePw.value.trim();
    if (!pw) return;
    gateBtn.disabled = true;
    gateErr.textContent = "";
    // Probe /health/full — a 200 confirms the password is correct.
    try {
      const res = await fetch("/health/full", {
        headers: { "Authorization": "Bearer " + pw }
      });
      if (res.ok) {
        sessionStorage.setItem("aime_token", pw);
        authToken = pw;
        gate.classList.add("hidden");
        addMsg("bot", "Hey, I'm Me — Wesley's AI twin. Ask me about your schedule, emails, or anything else.");
      } else {
        gateErr.textContent = "Wrong password.";
        gatePw.value = "";
        gatePw.focus();
      }
    } catch (e) {
      gateErr.textContent = "Network error — try again.";
    } finally {
      gateBtn.disabled = false;
    }
  }

  gateBtn.addEventListener("click", tryUnlock);
  gatePw.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });

  function logout() {
    sessionStorage.removeItem("aime_token");
    authToken = null;
    chat.innerHTML = "";
    gatePw.value = "";
    gateErr.textContent = "";
    gate.classList.remove("hidden");
    gatePw.focus();
  }

  // --- Chat ---
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const tidEl = document.getElementById("tid");

  let threadId = localStorage.getItem("aime_thread") || crypto.randomUUID();
  localStorage.setItem("aime_thread", threadId);
  tidEl.textContent = threadId.slice(0, 8);

  function newThread() {
    threadId = crypto.randomUUID();
    localStorage.setItem("aime_thread", threadId);
    tidEl.textContent = threadId.slice(0, 8);
    chat.innerHTML = "";
    addMsg("bot", "New conversation started. What's up?");
  }

  function addMsg(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMsg("user", text);
    input.value = "";
    sendBtn.disabled = true;
    const typing = addMsg("bot", "…");
    typing.classList.add("typing");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + authToken,
        },
        body: JSON.stringify({ message: text, thread_id: threadId }),
      });
      const data = await res.json();
      typing.remove();
      if (res.status === 401) {
        logout();
        addMsg("error", "Session expired. Please log in again.");
      } else if (!res.ok) {
        addMsg("error", "Error: " + (data.detail?.error || JSON.stringify(data)));
      } else {
        addMsg("bot", data.response);
      }
    } catch (err) {
      typing.remove();
      addMsg("error", "Network error: " + err.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  if (authToken) addMsg("bot", "Hey, I'm Me — Wesley's AI twin. Ask me about your schedule, emails, or anything else.");
</script>
</body>
</html>
