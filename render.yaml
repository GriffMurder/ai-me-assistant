services:
  - type: web
    name: ai-me-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: GOOGLE_CREDENTIALS_PATH
        value: credentials.json
      - key: PYTHON_VERSION
        value: 3.12.3
