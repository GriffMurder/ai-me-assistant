services:
  - type: web
    name: ai-me-assistant
    runtime: python
    plan: free
    nativePackages:
      - ffmpeg
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_PATH
        value: credentials.json
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: MY_PHONE_NUMBER
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: OPS_URL
        sync: false
      - key: TASKBULLET_URL
        sync: false
      - key: STRAWS_URL
        sync: false
      - key: ORCARW_URL
        sync: false
      - key: RETURNFLOW_URL
        sync: false
      - key: ADMIN_STATS_KEY
        sync: false
      - key: ADMIN_FINANCIALS_KEY
        sync: false
